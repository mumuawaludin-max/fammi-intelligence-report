<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
  <meta name="ext-resource-dependency" content="assets/fammi-logo.png" data-resource-id="fammiLogo" />
  <meta name="ext-resource-dependency" content="assets/fammi-logo-white.png" data-resource-id="fammiLogoWhite" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fammi Intelligence Report — Yayasan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Brand */
    --ungu: #6323DA;
    --ungu-700: #5418C2;
    --ungu-600: #6323DA;
    --ungu-300: #B79CF0;
    --ungu-100: #EDE6FB;
    --ungu-050: #F4EFFD;

    /* Warm neutrals */
    --bg: #F6F2EB;
    --bg-2: #F1ECE3;
    --surface: #FFFFFF;
    --surface-soft: #FBF9F5;

    /* Ink */
    --ink: #211B2E;
    --ink-2: #4A4458;
    --ink-3: #7C7689;
    --ink-4: #A8A2B4;

    /* Lines */
    --line: #ECE6F3;
    --line-warm: #E7E0D5;

    /* Status — used sparingly, small markers only */
    --aman: #2E9E6B;
    --aman-bg: #E7F4EE;
    --perhatian: #D69219;
    --perhatian-bg: #FAF1DC;
    --waspada: #D6455A;
    --waspada-bg: #FBE7EA;

    --radius-xl: 28px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;

    --shadow-card: 0 1px 2px rgba(33,27,46,0.04), 0 6px 24px rgba(33,27,46,0.05);
    --shadow-hero: 0 2px 4px rgba(99,35,218,0.05), 0 18px 48px rgba(99,35,218,0.08);
    --shadow-pop: 0 12px 40px rgba(33,27,46,0.14);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  #root { min-height: 100vh; }

  button { font-family: inherit; cursor: pointer; }
  ::selection { background: var(--ungu-100); }

  /* keep scrollbars calm */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: #DBD3E6; border-radius: 99px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/ig-charts.jsx"></script>
  <script type="text/babel" src="src/ig-kit.jsx"></script>

</body>
</html>
